      - any-glob-to-any-file:
          - app/src/main/java/**/engine/**
          - app/src/main/java/**/browser/**
area: gesture:
  - changed-files:
      - any-glob-to-any-file:
          - app/src/main/java/**/gesture/**
area: ui:
  - changed-files:
      - any-glob-to-any-file:
          - app/src/main/java/**/ui/**
          - app/src/main/java/**/design/**
area: tests:
  - changed-files:
      - any-glob-to-any-file:
          - app/src/test/**
          - app/src/androidTest/**

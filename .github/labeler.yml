area: docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
          - ROADMAP.md
          - CONTRIBUTING.md
area: build:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - build.gradle.kts
          - settings.gradle.kts
          - gradle.properties
          - app/build.gradle.kts
          - scripts/**

name: Release Drafter

on:
  push:
    branches:
      - master
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  update_release_draft:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

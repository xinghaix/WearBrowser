name: Bug report
description: Report a reproducible problem in WearBrowser.
title: "bug: "
labels: ["type: bug", "needs: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve WearBrowser. Please keep the report reproducible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / emulator
      placeholder: Pixel Watch, Galaxy Watch, Wear OS emulator, Android phone, etc.
  - type: input
    id: android
    attributes:
      label: Android / Wear OS version
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: text
